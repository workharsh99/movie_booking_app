name: Build and Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/movie-booking-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the latest image
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/movie-booking-app:latest
            
            # Stop the existing container if running
            sudo docker stop movie-booking-app || true
            sudo docker rm movie-booking-app || true
            
            # Run the new container
            sudo docker run -d --name movie-booking-app -p 80:80 ${{ secrets.DOCKERHUB_USERNAME }}/movie-booking-app:latest
            
            # Clean up old images
            sudo docker image prune -f
